<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Navy background -->
  <rect width="1200" height="630" fill="#002868"/>

  <!-- Red accent stripe at bottom -->
  <rect y="590" width="1200" height="40" fill="#BF0A30"/>

  <!-- Decorative left red bar -->
  <rect width="10" height="630" fill="#BF0A30"/>

  <!-- Star badge circle -->
  <circle cx="180" cy="315" r="120" fill="#001A45" stroke="#FFC107" stroke-width="4"/>

  <!-- Large star in badge -->
  <text x="180" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="130" fill="#FFC107">★</text>

  <!-- FloCo text -->
  <text x="360" y="260" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="#FFFFFF">FloCo</text>

  <!-- Democracy text -->
  <text x="360" y="360" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="#FFC107">Democracy</text>

  <!-- Tagline -->
  <text x="360" y="430" font-family="Arial, sans-serif" font-size="34" fill="#E8EAED">Florence County, South Carolina</text>

  <!-- Divider line -->
  <line x1="360" y1="450" x2="1100" y2="450" stroke="#BF0A30" stroke-width="3"/>

  <!-- Sub-tagline -->
  <text x="360" y="495" font-family="Arial, sans-serif" font-size="28" fill="#E8EAED">You don't have to work alone.</text>

  <!-- URL -->
  <text x="360" y="558" font-family="Arial, sans-serif" font-size="22" fill="#6B7280">flocodemocracy.org</text>
</svg>
